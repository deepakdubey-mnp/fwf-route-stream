spring.application.name=fwp-route-stream
spring.profiles.active=local

# =============================================
# Kafka Streams — common (profile overrides bootstrap-servers + security)
# =============================================
spring.kafka.streams.application-id=fwp-route-stream-app
spring.kafka.streams.properties.default.key.serde=org.apache.kafka.common.serialization.Serdes$StringSerde
spring.kafka.streams.properties.default.value.serde=org.apache.kafka.common.serialization.Serdes$StringSerde
spring.kafka.streams.properties.num.stream.threads=2
spring.kafka.streams.properties.default.deserialization.exception.handler=org.apache.kafka.streams.errors.LogAndContinueExceptionHandler
spring.kafka.streams.properties.default.production.exception.handler=org.apache.kafka.streams.errors.DefaultProductionExceptionHandler
spring.kafka.streams.properties.commit.interval.ms=1000
spring.kafka.streams.properties.cache.max.bytes.buffering=10485760

# --- Producer: durability + compression ---
# acks=all: producer blocks until ALL in-sync replicas have acknowledged the write.
# Works together with min.insync.replicas=2 on the broker/topic side to guarantee
# no data loss even if one replica fails immediately after the write.
spring.kafka.streams.properties.producer.acks=all
# lz4: fast compression codec; good throughput/CPU trade-off for routing payloads.
spring.kafka.streams.properties.producer.compression.type=lz4

# --- Internal topic defaults (Kafka Streams-created repartition / changelog topics) ---
# replication.factor=3 must be >= min.insync.replicas + 1 so a single broker failure
# does not drop below the ISR floor and block producers.
spring.kafka.streams.properties.replication.factor=3
# min.insync.replicas=2: at least 2 replicas must be in-sync before a write is accepted.
# NOTE: for external topics (routes, routes-ag) this must be set at topic-creation time
# (Kafka CLI / Terraform) — Kafka Streams does not own those topics.
spring.kafka.streams.properties.topic.min.insync.replicas=2

# =============================================
# Application — topic names
# =============================================
app.kafka.topics.routes=routes
app.kafka.topics.routes-ag=routes-ag

# =============================================
# JPA — common (datasource + ddl-auto overridden per profile)
# =============================================
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# =============================================
# Flyway — disabled by default; each profile opts in explicitly.
# Migration scripts live in classpath:db/migration and run before
# Hibernate validates the schema, so tables always exist on startup.
# =============================================
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# =============================================
# Actuator
# =============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always