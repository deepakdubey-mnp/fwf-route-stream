# =============================================
# Profile: ec2
# MSK (Amazon Managed Streaming for Kafka) — SASL/PLAIN (TLS in-transit)
# PostgreSQL on Amazon RDS
# Activate with: --spring.profiles.active=ec2
# =============================================

# --- Kafka Broker (MSK bootstrap endpoint) ---
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}

# --- Kafka Streams State Store ---
spring.kafka.streams.state-dir=/var/fwp-route-stream/state-store

# --- MSK Security: SASL/PLAIN over TLS
# For MSK with IAM auth, swap these four lines with:
#   spring.kafka.streams.properties.sasl.mechanism=AWS_MSK_IAM
#   spring.kafka.streams.properties.sasl.jaas.config=software.amazon.msk.auth.iam.IAMLoginModule required;
#   spring.kafka.streams.properties.sasl.client.callback.handler.class=software.amazon.msk.auth.iam.IAMClientCallbackHandler
# and add 'software.amazon.msk:aws-msk-iam-auth:2.2.0' to build.gradle.
spring.kafka.streams.properties.security.protocol=SASL_SSL
spring.kafka.streams.properties.sasl.mechanism=PLAIN
spring.kafka.streams.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required \
  username="${KAFKA_API_KEY}" \
  password="${KAFKA_API_SECRET}";
spring.kafka.streams.properties.ssl.endpoint.identification.algorithm=https

# --- PostgreSQL (Amazon RDS) ---
# DB_URL example: jdbc:postgresql://<rds-endpoint>:5432/fwp
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# --- Flyway: runs V1, V2 … migrations before Hibernate validates the schema.
#     Tables are guaranteed to exist when the application context finishes loading.
spring.flyway.enabled=true
spring.flyway.out-of-order=false
spring.flyway.validate-on-migrate=true

# --- JPA: validate only — Flyway owns all DDL in production ---
spring.jpa.hibernate.ddl-auto=validate

# --- Logging ---
logging.level.org.apache.kafka=WARN
logging.level.org.fwp=INFO