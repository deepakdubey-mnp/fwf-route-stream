# =============================================
# Profile: local
# Confluent Kafka (docker run -p 9092:9092 confluentinc/cp-kafka)
# PostgreSQL      (docker run -p 5432:5432 -e POSTGRES_DB=fwp
#                              -e POSTGRES_USER=fwp -e POSTGRES_PASSWORD=fwp postgres:16)
# =============================================

# --- Kafka Broker ---
spring.kafka.bootstrap-servers=localhost:9092

# --- Kafka Streams State Store ---
spring.kafka.streams.state-dir=/tmp/fwp-route-stream/state-store

# --- Local overrides: single-broker cannot satisfy replication.factor=3 or min.insync.replicas=2
spring.kafka.streams.properties.replication.factor=3
spring.kafka.streams.properties.topic.min.insync.replicas=2

# --- PostgreSQL ---
spring.datasource.url=jdbc:postgresql://localhost:5432/fwf_demo_db
spring.datasource.username=myuser
spring.datasource.password=secret
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA: Hibernate creates / alters tables on startup (no Flyway needed locally) ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- Flyway: off — Hibernate manages the schema on a single local broker ---
spring.flyway.enabled=false

# --- Logging ---
logging.level.org.apache.kafka=WARN
logging.level.org.fwp=DEBUG